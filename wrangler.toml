name = "my-ladybird"
main = "worker/index.js"
compatibility_date = "2026-05-07"
workers_dev = true
pages_build_output_dir = "dist"
routes = [
  { pattern = "ladybird.best/*", zone_name = "ladybird.best" },
  { pattern = "www.ladybird.best/*", zone_name = "ladybird.best" }
]

[vars]
APP_ORIGIN = "https://ladybird.best"
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/api/*",
  "/sitemap.xml",
  "/robots.txt"
]
